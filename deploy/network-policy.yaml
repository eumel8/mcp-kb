# NetworkPolicy: restrict traffic to/from mcp-kb components
#
# Policy model:
#  - postgres only accepts TCP:5432 from mcp-kb pods
#  - mcp-kb accepts inbound HTTP only from the ingress-nginx controller
#    (pods in the ingress-nginx namespace labelled
#     app.kubernetes.io/name: ingress-nginx)
#  - both pods may reach the internet for embeddings API + token introspection
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: mcp-kb
  labels:
    app.kubernetes.io/part-of: mcp-kb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-kb
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-kb-ingress
  namespace: mcp-kb
  labels:
    app.kubernetes.io/part-of: mcp-kb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-kb
  policyTypes:
    - Ingress
  ingress:
    # Allow HTTP only from the ingress-nginx controller pods.
    # Adjust the namespaceSelector if your controller lives in a different
    # namespace (common alternatives: ingress-nginx, kube-system).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
